info:
  name: Create
  type: http
  seq: 3

http:
  method: POST
  url: "{{PATH_URL}}/bus"
  body:
    type: json
    data: |-
      {
        "RouteNumber" : "",
        "BusModel" : "",
        "DNI" : "",
        "FirstName" : "",
        "LastName" : "",
        "Gender" : ""
      }
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5

docs: |-
  En este endpoint se procede a crear los datos para los buses y sus respectivas rutas.
  Se necesita el modelo del bus, el numero de ruta el     cual es obligatorio, y tambien los datos del conductor.
