docs: |-
  Este es el update, lo unico que se necesita es poner la fecha arriba en el put. 
  Lo que va a hacer es buscar si esa fecha existe en la 
  tabla de Dailies Statistic, si existe entonces se va a la tabla de routes y actualiza con los datos mas recientes.

  No se necesita poner ningun dato en el Body, ya que es ilogico poner mano a los datos.
