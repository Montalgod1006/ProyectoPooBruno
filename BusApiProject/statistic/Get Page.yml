info:
  name: Get Page
  type: http
  seq: 1

http:
  method: GET
  url: "{{PATH_URL}}/statistic?page=1&pageSize=10&searchTerm="
  params:
    - name: page
      value: "1"
      type: query
    - name: pageSize
      value: "10"
      type: query
    - name: searchTerm
      value: ""
      type: query
  auth: inherit

settings:
  encodeUrl: true
  timeout: 0
  followRedirects: true
  maxRedirects: 5
